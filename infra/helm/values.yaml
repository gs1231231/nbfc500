# BankOS Helm Chart - Default Values
# Override these in values-staging.yaml / values-prod.yaml

# ─── Global ────────────────────────────────────────────────────────────────────
global:
  imageRegistry: "registry.example.com/bankos"
  imageTag: "latest"
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - name: registry-credentials

  # Namespace for all resources
  namespace: bankos

  # Environment label - affects Sentry, logging level
  environment: production

  # Common labels applied to all resources
  labels:
    app.kubernetes.io/part-of: bankos
    app.kubernetes.io/managed-by: helm

# ─── Services Configuration ────────────────────────────────────────────────────
services:
  api-gateway:
    enabled: true
    image: api-gateway
    replicas: 3
    port: 3000
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3000"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

  loan-service:
    enabled: true
    image: loan-service
    replicas: 2
    port: 3001
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "2Gi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3001"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70

  collection-service:
    enabled: true
    image: collection-service
    replicas: 2
    port: 3002
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3002"
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 4
      targetCPUUtilizationPercentage: 70

  payment-service:
    enabled: true
    image: payment-service
    replicas: 2
    port: 3003
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3003"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

  notification-service:
    enabled: true
    image: notification-service
    replicas: 1
    port: 3004
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3004"
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 80

  underwriting-service:
    enabled: true
    image: underwriting-service
    replicas: 2
    port: 3005
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "2Gi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3005"
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 65

  reports-service:
    enabled: true
    image: reports-service
    replicas: 1
    port: 3006
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    envVars:
      LOG_LEVEL: "info"
      PORT: "3006"
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 2
      targetCPUUtilizationPercentage: 70

# ─── Database ──────────────────────────────────────────────────────────────────
database:
  host: "postgres-primary.bankos.svc.cluster.local"
  port: 5432
  name: "bankos_prod"
  # Credentials via K8s secret named 'bankos-db-credentials'
  secretName: bankos-db-credentials
  secretUserKey: username
  secretPasswordKey: password
  maxConnections: 20
  idleTimeoutMs: 30000

# ─── Redis ─────────────────────────────────────────────────────────────────────
redis:
  host: "redis-master.bankos.svc.cluster.local"
  port: 6379
  secretName: bankos-redis-credentials
  secretPasswordKey: password
  ttlSeconds: 3600

# ─── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.bankos.in
      paths:
        - path: /
          pathType: Prefix
          service: api-gateway
          port: 3000
    - host: loans.bankos.in
      paths:
        - path: /
          pathType: Prefix
          service: loan-service
          port: 3001
  tls:
    - secretName: bankos-tls-cert
      hosts:
        - api.bankos.in
        - loans.bankos.in

# ─── ConfigMap Non-Secret Env ──────────────────────────────────────────────────
config:
  NODE_ENV: production
  TZ: "Asia/Kolkata"
  CIBIL_ADAPTER: real
  AADHAAR_ADAPTER: real
  PAN_ADAPTER: real
  NACH_ADAPTER: real
  DISBURSEMENT_ADAPTER: real
  UPI_ADAPTER: real
  SMS_ADAPTER: real
  WHATSAPP_ADAPTER: real
  ESIGN_ADAPTER: real
  STORAGE_ADAPTER: real
  AA_ADAPTER: real
  GST_ADAPTER: real
  VAHAN_ADAPTER: real
  CERSAI_ADAPTER: real
  AWS_REGION: ap-south-1

# ─── Pod Disruption Budget ─────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ─── Service Account ───────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: bankos-sa
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/bankos-s3-role

# ─── Security Context ──────────────────────────────────────────────────────────
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Probe Configuration ───────────────────────────────────────────────────────
probes:
  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /health/ready
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# ─── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  prometheus:
    enabled: true
    port: 9090
    path: /metrics
    scrapeInterval: 30s
