# BankOS Prometheus Configuration - Prompt 47
# Scrapes metrics from all NestJS microservices.
# NestJS exposes Prometheus metrics via @willsoto/nestjs-prometheus on /metrics.

global:
  scrape_interval: 30s        # How frequently to scrape targets
  evaluation_interval: 30s    # How frequently to evaluate rules
  scrape_timeout: 10s
  external_labels:
    cluster: bankos-production
    region: ap-south-1
    environment: production

# ─── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
      scheme: http
      timeout: 10s

# ─── Rule Files ────────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/*.yml

# ─── Scrape Configurations ─────────────────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /metrics

  # ── API Gateway ────────────────────────────────────────────────────────────
  - job_name: bankos-api-gateway
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - api-gateway.bankos.svc.cluster.local:9090
        labels:
          service: api-gateway
          team: platform
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: api-gateway

  # ── Loan Service ───────────────────────────────────────────────────────────
  - job_name: bankos-loan-service
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - loan-service.bankos.svc.cluster.local:9090
        labels:
          service: loan-service
          team: lending
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: loan-service

  # ── Collection Service ─────────────────────────────────────────────────────
  - job_name: bankos-collection-service
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - collection-service.bankos.svc.cluster.local:9090
        labels:
          service: collection-service
          team: collections
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: collection-service

  # ── Payment Service ────────────────────────────────────────────────────────
  - job_name: bankos-payment-service
    metrics_path: /metrics
    scrape_interval: 15s  # faster scrape for payment critical path
    static_configs:
      - targets:
          - payment-service.bankos.svc.cluster.local:9090
        labels:
          service: payment-service
          team: payments
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: payment-service

  # ── Notification Service ───────────────────────────────────────────────────
  - job_name: bankos-notification-service
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - notification-service.bankos.svc.cluster.local:9090
        labels:
          service: notification-service
          team: platform
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: notification-service

  # ── Underwriting Service ───────────────────────────────────────────────────
  - job_name: bankos-underwriting-service
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - underwriting-service.bankos.svc.cluster.local:9090
        labels:
          service: underwriting-service
          team: credit
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: underwriting-service

  # ── Reports Service ────────────────────────────────────────────────────────
  - job_name: bankos-reports-service
    metrics_path: /metrics
    scrape_interval: 60s  # reports are batch; less critical
    static_configs:
      - targets:
          - reports-service.bankos.svc.cluster.local:9090
        labels:
          service: reports-service
          team: analytics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - target_label: app
        replacement: reports-service

  # ── PostgreSQL (via postgres_exporter) ──────────────────────────────────────
  - job_name: bankos-postgres
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - postgres-exporter.bankos.svc.cluster.local:9187
        labels:
          service: postgres
          team: platform
    relabel_configs:
      - target_label: app
        replacement: postgres

  # ── Redis (via redis_exporter) ─────────────────────────────────────────────
  - job_name: bankos-redis
    metrics_path: /metrics
    scrape_interval: 30s
    static_configs:
      - targets:
          - redis-exporter.bankos.svc.cluster.local:9121
        labels:
          service: redis
          team: platform
    relabel_configs:
      - target_label: app
        replacement: redis

  # ── Kubernetes node metrics (via node_exporter) ────────────────────────────
  - job_name: kubernetes-nodes
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
      insecure_skip_verify: true
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/$1/proxy/metrics

  # ── Kubernetes pod auto-discovery ──────────────────────────────────────────
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: [bankos]
    relabel_configs:
      # Only scrape pods with annotation prometheus.io/scrape=true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
