# ─────────────────────────────────────────────────────────────────────────────
# BankOS — Nginx reverse proxy
# Runs on port 80 inside Docker Compose on t3.small
#
# Routing:
#   /api/      → api-gateway:3000 (NestJS, global prefix api/v1)
#   /api/docs  → api-gateway:3000 (Swagger UI)
#   /          → web-portal:3000  (Next.js)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;                      # one per vCPU
worker_rlimit_nofile 8192;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Upload size — document uploads up to 10 MB ────────────────────────────
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 30 req/s per IP for the API; bursts of 20 allowed
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    # More relaxed for the web portal (static assets etc.)
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=60r/s;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream api_backend {
        server api-gateway:3000;
        keepalive 16;
    }

    upstream web_frontend {
        server web-portal:3000;
        keepalive 16;
    }

    # ── Proxy shared settings ─────────────────────────────────────────────────
    proxy_http_version          1.1;
    proxy_set_header Connection "";          # keep-alive to upstream
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_read_timeout                  60s;
    proxy_connect_timeout               10s;
    proxy_send_timeout                  60s;

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;          # catch-all; replace with real domain when ready

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"         always;
        add_header X-Content-Type-Options    "nosniff"            always;
        add_header X-XSS-Protection          "1; mode=block"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        # CSP — tighten once the exact external origins are known
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self';"
            always;

        # Hide nginx version
        server_tokens off;

        # ── Health check (used by AWS target group / monitoring) ─────────────
        location = /health {
            proxy_pass http://api_backend/api/v1/health;
            access_log off;
        }

        # ── Swagger UI ───────────────────────────────────────────────────────
        location /api/docs {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api_backend;
        }

        # ── REST API ─────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api_backend;

            # Longer timeout for file uploads and long-running operations
            proxy_read_timeout 120s;

            # CORS handled by NestJS; do not add duplicate headers here
        }

        # ── Next.js static assets (_next/static) ─────────────────────────────
        location /_next/static/ {
            proxy_pass http://web_frontend;
            # These files have content-hashed names — safe to cache for 1 year
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Next.js image optimisation endpoint ──────────────────────────────
        location /_next/image {
            proxy_pass http://web_frontend;
        }

        # ── Web portal (everything else) ─────────────────────────────────────
        location / {
            limit_req zone=web_limit burst=30 nodelay;
            proxy_pass http://web_frontend;

            # Support Next.js HMR websocket in dev (no-op in prod)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Custom error pages ────────────────────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            internal;
            return 503 '{"error":"Service temporarily unavailable","statusCode":503}';
            add_header Content-Type application/json;
        }
    }
}
